<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Oficial da Budega do Zé</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#1d1d1d;
color:white;
display:flex;
}

.sidebar{

width:250px;
background:#111;
height:100vh;
padding:20px;
box-sizing:border-box;

}

.sidebar h2{

color:#ff8800;
text-align:center;

}

.menu{

display:flex;
flex-direction:column;
margin-top:30px;
gap:12px;

}

.menu button{

padding:14px;
border:none;
border-radius:8px;
background:#2d2d2d;
color:white;
cursor:pointer;
font-size:16px;
transition:.2s;

}

.menu button:hover{

background:#ff8800;

}

.content{

flex:1;
padding:40px;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌵 Budega do Zé</h2>

<div class="menu">

<button>🍺 Comandas</button>

<button>👥 Clientes</button>

<button>🍟 Produtos</button>

<button>📦 Estoque</button>

<button>💰 Caixa</button>

<button>👨 Funcionários</button>

<button>📈 Relatórios</button>

<button>⚙ Configurações</button>

</div>

</div>

<div class="content">

<h1>Bem-vindo ao Sistema Oficial da Budega do Zé</h1>

<p>Escolha uma opção no menu.</p>

</div>

</body>
</html>
